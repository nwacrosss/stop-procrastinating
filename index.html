<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #eff1f5;
      --text: #4c4f69;
      /* Catppuccin Palette */
      --cp-red: #f38ba8;
      --cp-orange: #fab387;
      --cp-yellow: #f9e2af;
      --cp-blue: #89b4fa;
      --cp-green: #a6e3a1;
      --cp-purple: #cba6f7;
      --cp-pink: #f5c2e7;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e2e;
        --text: #cdd6f4;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background: var(--bg);
      font-family: Poppins, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      transition: background-color 180ms ease, color 180ms ease;
    }

    .card {
      width: min(520px, 100%);
      text-align: left;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.76rem, 6.4vw, 2.88rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    /* 
       FOCUS TEXT: 
       Horizontal movement, left to right 
    */
    h1 span {
      display: inline-block;
      background: linear-gradient(
        to right,
        var(--cp-red),
        var(--cp-orange),
        var(--cp-yellow),
        var(--cp-blue),
        var(--cp-green),
        var(--cp-purple),
        var(--cp-pink)
      );
      background-size: 500% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shineHorizontal 5s ease-in-out infinite alternate;
    }

    /* 
       STRONG TAGS: 
       Diagonal movement, up-left 
    */
    strong {
      display: inline-block;
      font-weight: 900;
      background: linear-gradient(
        135deg,
        var(--cp-red),
        var(--cp-orange),
        var(--cp-yellow),
        var(--cp-blue),
        var(--cp-green),
        var(--cp-purple),
        var(--cp-pink)
      );
      background-size: 500% 500%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shineDiagonal 5s ease-in-out infinite alternate;
    }

    p {
      max-width: 440px;
      margin: 24px 0 0;
      color: var(--text);
      font-size: clamp(1.15rem, 4vw, 1.42rem);
      font-weight: 500;
      line-height: 1.45;
    }

    /* ANIMATIONS */

    @keyframes shineHorizontal {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 100% 50%;
      }
    }

    @keyframes shineDiagonal {
      0% {
        background-position: 0% 0%;
      }
      100% {
        background-position: 100% 100%;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
      }

      .card {
        width: min(440px, 100%);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Stop procrastinating.<br><span>Focus.</span></h1>
    <p>
      Please get back to work... No more <strong>'only 5 minutes more'.</strong> You <strong>KNOW</strong> that WILL stack up into <strong>HOURS</strong>. <br><strong>Please... Your goals aren't gonna achieve themselves. Future you will thank you a lot.</strong>
    </p>
  </main>
</body>
</html>
